name: AppImage

# AUTOMATIC CI BUILD DISABLED. The AppImage is now built LOCALLY in a manylinux
# docker container via dist/appimage/build-in-container.sh (the dev box has
# docker), so CI no longer builds/attaches it on release tags — the local build
# is validated end-to-end (incl. the camera-stack 4a gate + a real-camera probe)
# before the .AppImage is uploaded to the release by hand. This workflow is kept
# for manual, clean-room runs only (workflow_dispatch); to restore the old
# tag-triggered behaviour, un-comment the `push:` trigger below.
#
# Build the portable AppImage in a manylinux container so it requires only an
# OLD glibc (2.34) and a GENERIC x86-64 baseline — never the CI/dev host's libc
# or CPU tuning.
on:
  # push:
  #   tags: ['v*']          # DISABLED — the AppImage is built locally via docker
  workflow_dispatch:

jobs:
  appimage:
    runs-on: ubuntu-latest
    # The "Attach to the release" step (gh release upload) needs write access;
    # the default GITHUB_TOKEN is read-only and returns HTTP 403 on upload.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # The build runs INSIDE the manylinux image via `docker run` (rather than
      # the job's `container:`) so the host job still has node/gh/docker for the
      # surrounding steps, and the bundle's only base is the old container.
      - name: Build AppImage in manylinux_2_34
        run: |
          mkdir -p "$PWD/out"
          docker run --rm \
            -v "$PWD":/src:ro \
            -v "$PWD/out":/out \
            -e PYVER=cp312-cp312 \
            quay.io/pypa/manylinux_2_34_x86_64 \
            bash /src/dist/appimage/build-appimage.sh

      # "verify" variant: bundle the official Helios release so previews are
      # proof-verified out of the box. Helios needs glibc >= 2.39, so this
      # AppImage's floor is 2.39 (vs 2.34 for the normal one) — but it only
      # gets COPIED into the AppDir here, so the 2.34 build container is fine.
      - name: Fetch helios release
        run: |
          mkdir -p "$PWD/helios"
          curl -sSL "https://github.com/a16z/helios/releases/latest/download/helios_linux_amd64.tar.gz" \
            | tar -xzC "$PWD/helios"
          chmod +x "$PWD/helios/helios"
          "$PWD/helios/helios" --version

      - name: Build verify AppImage in manylinux_2_34
        run: |
          docker run --rm \
            -v "$PWD":/src:ro \
            -v "$PWD/out":/out \
            -e PYVER=cp312-cp312 \
            -e QETH_BUNDLE_HELIOS=/src/helios/helios \
            quay.io/pypa/manylinux_2_34_x86_64 \
            bash /src/dist/appimage/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: qeth-appimage
          path: out/*.AppImage
          if-no-files-found: error

      - name: Attach to the release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" out/*.AppImage --clobber
