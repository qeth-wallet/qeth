[project]
name = "qeth"
version = "0.9.4"
description = "Qt-based Ethereum wallet with Ledger support, Frame-compatible JSON-RPC"
requires-python = ">=3.10"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
# PySide6 is intentionally NOT listed here. On Linux desktops with a configured
# Qt theme (qt5ct/qt6ct, KDE Breeze, etc.), the PyPI PySide6 wheel ships its
# own Qt build that lacks the matching platform-theme plugins, so themes are
# silently ignored. Use system PySide6 instead:
#   uv venv --system-site-packages
#   uv pip install -e .
# If you don't have system PySide6, install the [bundled] extra:
#   uv pip install -e .[bundled]
dependencies = [
    "ledgereth>=0.10",
    "aiohttp>=3.9",
    "segno>=1.6",
    "eth-abi>=5.0",
    "web3>=7",
]

[project.optional-dependencies]
bundled = ["PySide6>=6.6"]
# Local transaction simulation (event preview before broadcast). revm
# (Rust) via PyO3 — one compiled wheel, ~no Python dep tree; the app
# degrades gracefully to "no preview" when it's absent. Install with:
#   uv pip install -e '.[simulate]'
simulate = ["pyrevm>=0.3"]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pytest>=8",
    "pytest-qt>=4.4",
]

[tool.pytest.ini_options]
# Network tests exercise real Blockscout / DefiLlama / GoPlus / Curve /
# chain RPC endpoints; they're skipped by default to keep `pytest` fast
# and hermetic. To run only them:    uv run pytest -m network
# To run everything (offline + online): uv run pytest -m ''
markers = [
    "network: requires live network and external services",
]
addopts = "-m 'not network'"
# pytest-qt: tell it which Qt binding we use. The "offscreen" Qt
# platform plugin is set in tests/conftest.py before QApplication is
# created, so UI tests don't pop windows on the developer's screen
# (and also work in CI / SSH sessions without a display).
qt_api = "pyside6"

[tool.mypy]
python_version = "3.10"
# Enforced scope. Two tiers:
#  - The Qt-free core: fully checked.
#  - The PySide6 UI layer: checked with `attr-defined` disabled (see the
#    override below). PySide6's stubs only expose Qt enums in their
#    *scoped* form (Qt.AlignmentFlag.AlignLeft); our code still uses the
#    deprecated flat aliases (Qt.AlignLeft), which trips ~230
#    `attr-defined` false positives. Disabling that one code lets the
#    *real* errors (None-safety, bad args) through. The flat→scoped enum
#    migration (which lets us re-enable attr-defined) is the follow-up.
# Run `uv run mypy` (no args) to check the enforced set; tests/test_typing.py
# gates it.
files = [
    # --- Qt-free core (fully checked) ---
    "qeth/__init__.py",
    "qeth/chain.py",
    "qeth/chains.py",
    "qeth/store.py",
    "qeth/tokens.py",
    "qeth/tokenlists.py",
    "qeth/token_metadata.py",
    "qeth/prices.py",
    "qeth/abi.py",
    "qeth/abi_cache.py",
    "qeth/simulate.py",
    "qeth/transactions.py",
    "qeth/transactions_cache.py",
    "qeth/wallet_cache.py",
    "qeth/risk.py",
    "qeth/hot_wallet.py",
    "qeth/import_sources.py",
    "qeth/chainlist.py",
    "qeth/rpc.py",
    # --- PySide6 UI layer (checked, attr-defined disabled) ---
    "qeth/__main__.py",
    "qeth/ui.py",
    "qeth/plugin.py",
    "qeth/plugins/wallets.py",
    "qeth/plugins/tokens.py",
    "qeth/plugins/transactions.py",
    "qeth/plugins/sign_message.py",
    "qeth/icons.py",
    "qeth/tray.py",
    "qeth/ledger.py",
    "qeth/signing.py",
    "qeth/alerts.py",
    "qeth/branding.py",
    "qeth/formatting.py",
    "qeth/ens.py",
    "qeth/chain_rpc_dialog.py",
]
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true

# Third-party packages without (complete) type stubs. Suppress
# "missing import" noise so the check stays focused on our own code.
[[tool.mypy.overrides]]
module = [
    "ledgereth.*",
    "pyrevm.*",
    "segno.*",
    "web3.*",
    "eth_abi.*",
    "eth_utils.*",
    "hexbytes.*",
]
ignore_missing_imports = true

[project.scripts]
qeth = "qeth.__main__:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["qeth*"]

[tool.setuptools.package-data]
qeth = ["assets/native/*.png", "assets/chains/*.png", "assets/logos/*.svg"]
